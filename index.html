<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>流影社 - 中文流媒体应用原型</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 自定义样式 */
        .phone-container {
            width: 393px;
            height: 852px;
            background: #000;
            border-radius: 40px;
            padding: 8px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            margin: 20px auto;
            position: relative;
        }
        
        .phone-screen {
            width: 100%;
            height: 100%;
            border-radius: 32px;
            overflow: hidden;
            background: #0F0F0F;
            position: relative;
        }
        
        .status-bar {
            height: 44px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 50;
        }
        
        .tab-bar {
            height: 80px;
            background: rgba(26,26,26,0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-around;
            align-items: center;
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 50;
        }
        
        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #666;
            cursor: pointer;
            transition: color 0.3s;
        }
        
        .tab-item.active {
            color: #FF6B6B;
        }
        
        .tab-item i {
            font-size: 20px;
            margin-bottom: 4px;
        }
        
        .tab-item span {
            font-size: 10px;
        }
        
        .page-content {
            height: calc(100% - 44px - 80px);
            margin-top: 44px;
            overflow: hidden;
        }
        
        .page-frame {
            width: 100%;
            height: 100%;
            border: none;
            background: #0F0F0F;
        }
        
        /* 导航按钮样式 */
        .nav-buttons {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .nav-btn {
            background: rgba(255,107,107,0.9);
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .nav-btn:hover {
            background: #FF6B6B;
            transform: translateY(-2px);
        }
        
        .nav-btn.active {
            background: #FF6B6B;
            box-shadow: 0 4px 12px rgba(255,107,107,0.4);
        }
    </style>
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center">
    <!-- 导航按钮 -->
    <div class="nav-buttons">
        <button class="nav-btn active" onclick="loadPage('pages/home.html', this)">首页</button>
        <button class="nav-btn" onclick="loadPage('pages/browse.html', this)">分类</button>
        <button class="nav-btn" onclick="loadPage('pages/video-detail.html', this)">详情</button>
        <button class="nav-btn" onclick="loadPage('pages/player.html', this)">播放</button>
        <button class="nav-btn" onclick="loadPage('pages/social.html', this)">社交</button>
        <button class="nav-btn" onclick="loadPage('pages/profile.html', this)">个人</button>
        <button class="nav-btn" onclick="loadPage('pages/settings.html', this)">设置</button>
        <button class="nav-btn" onclick="loadPage('pages/auth.html', this)">登录</button>
    </div>

    <!-- 手机容器 -->
    <div class="phone-container">
        <div class="phone-screen">
            <!-- iOS状态栏 -->
            <div class="status-bar">
                <div>9:41</div>
                <div class="flex items-center gap-1">
                    <i class="fas fa-signal text-xs"></i>
                    <i class="fas fa-wifi text-xs"></i>
                    <i class="fas fa-battery-three-quarters text-xs"></i>
                </div>
            </div>
            
            <!-- 页面内容 -->
            <div class="page-content">
                <iframe id="pageFrame" class="page-frame" src="pages/home.html"></iframe>
            </div>
            
            <!-- 底部Tab Bar -->
            <div class="tab-bar">
                <div class="tab-item active" onclick="loadPageFromTab('pages/home.html', this)">
                    <i class="fas fa-home"></i>
                    <span>首页</span>
                </div>
                <div class="tab-item" onclick="loadPageFromTab('pages/browse.html', this)">
                    <i class="fas fa-th-large"></i>
                    <span>分类</span>
                </div>
                <div class="tab-item" onclick="loadPageFromTab('pages/social.html', this)">
                    <i class="fas fa-users"></i>
                    <span>社交</span>
                </div>
                <div class="tab-item" onclick="loadPageFromTab('pages/profile.html', this)">
                    <i class="fas fa-user"></i>
                    <span>我的</span>
                </div>
                <div class="tab-item" onclick="loadPageFromTab('pages/settings.html', this)">
                    <i class="fas fa-cog"></i>
                    <span>设置</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        function loadPage(url, button) {
            document.getElementById('pageFrame').src = url;
            
            // 更新导航按钮状态
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            if (button) button.classList.add('active');
        }
        
        function loadPageFromTab(url, tabItem) {
            document.getElementById('pageFrame').src = url;
            
            // 更新Tab状态
            document.querySelectorAll('.tab-item').forEach(item => item.classList.remove('active'));
            tabItem.classList.add('active');
            
            // 同步导航按钮状态
            const pageMap = {
                'pages/home.html': 0,
                'pages/browse.html': 1,
                'pages/social.html': 4,
                'pages/profile.html': 5,
                'pages/settings.html': 6
            };
            
            const navButtons = document.querySelectorAll('.nav-btn');
            navButtons.forEach(btn => btn.classList.remove('active'));
            if (pageMap[url] !== undefined) {
                navButtons[pageMap[url]].classList.add('active');
            }
        }
    </script>
</body>
</html>
